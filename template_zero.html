    <style>
        :root {
            --font-brand: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
        }

        body.staticrypt-body {
            background-color: var(--bg-primary, #08090b);
            color: var(--text-primary, #e4e6eb);
            font-family: var(--font-brand);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
        }

        /* Subtle dark background glow */
        body.staticrypt-body::before {
            content: '';
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
            z-index: 0;
        }

        .staticrypt-spinner-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary, #08090b);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .staticrypt-spinner {
            display: inline-block;
            width: 48px;
            height: 48px;
            border: 3px solid rgba(212, 175, 55, 0.2);
            border-right-color: var(--gold-primary, #d4af37);
            border-radius: 50%;
            animation: spinner-border 0.8s linear infinite;
        }

        @keyframes spinner-border {
            100% {
                transform: rotate(360deg);
            }
        }

        .staticrypt-content {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .staticrypt-card {
            background: var(--card-bg, #12151a);
            border: 1px solid var(--card-border, rgba(255, 255, 255, 0.08));
            border-radius: 16px;
            padding: 44px 36px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 20px rgba(212, 175, 55, 0.08);
            text-align: center;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .staticrypt-card:hover {
            border-color: rgba(212, 175, 55, 0.3);
        }

        .staticrypt-logo-area {
            margin-bottom: 28px;
        }

        .staticrypt-logo {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #ffffff;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .staticrypt-logo-badge {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid var(--gold-primary, #d4af37);
            color: var(--gold-primary, #d4af37);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
        }

        .staticrypt-badge {
            display: inline-block;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--gold-primary, #d4af37);
            color: var(--gold-primary, #d4af37);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .staticrypt-title {
            font-size: 1.45rem;
            font-weight: 700;
            color: var(--text-primary, #ffffff);
            margin-bottom: 12px;
            letter-spacing: 0.04em;
        }

        .staticrypt-instructions-text {
            color: var(--text-secondary, #9ba1ad);
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .staticrypt-password-container {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }

        .staticrypt-password-input {
            width: 100%;
            background: rgba(8, 9, 11, 0.8);
            border: 1px solid var(--card-border, rgba(255, 255, 255, 0.12));
            border-radius: 10px;
            color: #ffffff;
            font-size: 1rem;
            padding: 16px 48px 16px 18px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.25s ease;
            letter-spacing: 0.05em;
        }

        .staticrypt-password-input:focus {
            border-color: var(--gold-primary, #d4af37);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
            background: rgba(8, 9, 11, 0.95);
        }

        .staticrypt-toggle-password-visibility {
            cursor: pointer;
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 22px;
            height: 22px;
            opacity: 0.6;
            transition: opacity 0.2s ease;
            filter: invert(1);
        }

        .staticrypt-toggle-password-visibility:hover {
            opacity: 1;
        }

        label.staticrypt-remember {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            color: var(--text-secondary, #9ba1ad);
            font-size: 0.88rem;
            margin-bottom: 26px;
            cursor: pointer;
            user-select: none;
        }

        .staticrypt-remember input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.4);
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .staticrypt-remember input[type="checkbox"]:checked {
            background: var(--gold-primary, #d4af37);
            border-color: var(--gold-primary, #d4af37);
        }

        .staticrypt-remember input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 2px;
            width: 5px;
            height: 9px;
            border: solid #000000;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .staticrypt-decrypt-button {
            width: 100%;
            background: linear-gradient(135deg, #f5e0a3 0%, #d4af37 50%, #aa820a 100%);
            color: #08090b;
            font-weight: 700;
            font-size: 1.05rem;
            padding: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            letter-spacing: 0.06em;
        }

        .staticrypt-decrypt-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(212, 175, 55, 0.5);
            filter: brightness(1.05);
        }

        .staticrypt-decrypt-button:active {
            transform: translateY(0);
        }

        .staticrypt-footer-note {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.8rem;
            color: var(--text-muted, #6c727f);
            line-height: 1.6;
        }

        .staticrypt-footer-note a {
            color: var(--gold-primary, #d4af37);
            text-decoration: none;
        }

        .staticrypt-footer-note a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
