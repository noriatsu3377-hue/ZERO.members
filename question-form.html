<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>質問・症例相談フォーム | 零 -ZERO- MEMBERS</title>
  <meta name="description" content="零 -ZERO- MEMBERS会員専用の匿名質問・症例相談フォームです。">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header" id="main-header">
    <div class="container header-container">
      <a href="index.html" class="logo" id="logo-link">
        <span>零 -ZERO-</span> <div class="logo-badge">MEMBERS</div>
      </a>
      <nav id="site-navigation">
        <ul class="nav-links">
          <li><a href="index.html">ホーム</a></li>
          <li><a href="index.html#featured-title-heading">講義一覧</a></li>
        </ul>
      </nav>
      <a href="https://noriatsu3377-hue.github.io/ZERO-/" target="_blank" rel="noopener noreferrer" class="nav-cta" id="back-community-btn">コミュニティ概要</a>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container" style="min-height: 80vh; padding-top: 40px; padding-bottom: 40px;">
    
    <div class="form-section-container" style="margin-top: 40px;">
      <div class="form-header-wrapper">
         <h1 class="section-title" style="justify-content: center; margin-bottom: 12px; font-size: 2.2rem;">
           <span style="color: var(--gold-primary); margin-right: 12px;">Q&A</span> 質問・症例相談フォーム（匿名）
         </h1>
         <p style="color: var(--text-secondary); font-size: 1rem;">現場での悩みや特定症例についての疑問を匿名で投稿できます。</p>
      </div>
      
      <div class="form-iframe-wrapper">
        <div class="form-iframe-inner">
          
          <!-- Native Premium Form -->
          <form action="https://docs.google.com/forms/d/e/1FAIpQLSffygp7qxn_h_oNw2RXQKBA35TDbQ37HCEPuUVgqeu8zuWT2w/formResponse" method="POST" target="hidden_iframe" class="custom-form" onsubmit="submitted=true;">
            <div class="form-group">
              <label for="consultation-content">相談内容 <span style="color: #ff4d4f;">*</span></label>
              <textarea id="consultation-content" name="entry.447097305" rows="10" placeholder="こちらに質問や症例のご相談を入力してください" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 14px 0;">質問を送信する</button>
          </form>

          <!-- Success Message (Hidden by default) -->
          <div id="success-message" style="display: none; text-align: center; padding: 60px 0;">
            <svg viewBox="0 0 24 24" width="64" height="64" fill="var(--gold-primary)" style="margin-bottom: 20px;">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
            <h3 style="color: var(--gold-primary); font-size: 1.8rem; margin-bottom: 16px;">送信完了しました</h3>
            <p style="color: var(--text-secondary); line-height: 1.8;">ご相談ありがとうございます。<br>回答は今後の講義コンテンツや症例検討会にて反映させていただきます。</p>
          </div>

          <!-- Hidden Iframe to catch the form submission -->
          <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) { document.querySelector('.custom-form').style.display='none'; document.getElementById('success-message').style.display='block'; window.scrollTo(0, 0); }"></iframe>
          <script>var submitted = false;</script>

        </div>
      </div>
      
      <div style="margin-top: 40px; text-align: center;">
        <a href="index.html" class="btn btn-secondary">ホームへ戻る</a>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="site-footer" id="site-footer">
    <div class="container footer-container">
      <div class="footer-brand">
        <a href="index.html" class="logo"><span>零 -ZERO-</span> <div class="logo-badge">MEMBERS</div></a>
        <p>足す前に戻る。身体本来の完成形を会員限定で深く探求する。</p>
      </div>
      <div>
        <ul class="footer-links">
          <li><a href="index.html">ホーム</a></li>
          <li><a href="index.html#featured-title-heading">講義一覧</a></li>
          <li><a href="https://noriatsu3377-hue.github.io/ZERO-/" target="_blank" rel="noopener noreferrer">コミュニティ概要</a></li>
        </ul>
      </div>
    </div>
    <div class="container copyright">
      &copy; 2026 零 -ZERO- MEMBERS All Rights Reserved.
    </div>
  </footer>

</body>
</html>
