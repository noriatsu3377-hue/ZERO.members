        async hashPassword(password, saltHex) {
            const enc = new TextEncoder();
            const saltBytes = enc.encode(saltHex);

            async function deriveRound(passStr, iterations, hashName, bitLength) {
                const passBytes = enc.encode(passStr);
                const keyMaterial = await window.crypto.subtle.importKey(
                    "raw",
                    passBytes,
                    { name: "PBKDF2" },
                    false,
                    ["deriveBits"]
                );
                const bits = await window.crypto.subtle.deriveBits(
                    {
                        name: "PBKDF2",
                        salt: saltBytes,
                        iterations: iterations,
                        hash: hashName
                    },
                    keyMaterial,
                    bitLength || 256
                );
                const bytes = new Uint8Array(bits);
                return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
            }

            const cleanPass = (password || "").trim();
            const r1 = await deriveRound(cleanPass, 1000, "SHA-1", 160);
            const r2 = await deriveRound(r1, 14000, "SHA-256", 256);
            const r3 = await deriveRound(r2, 585000, "SHA-256", 256);

    const codec = {
        init(engine) {

                            const bytes = new Uint8Array(hex.length / 2);
                            for (let i = 0; i < bytes.length; i++) {
                                bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
                            }
                            return bytes;
                        }

                        if (!encryptedMsg || encryptedMsg.length < 96) {
                            return { success: false };
                        }

                        const hmacHex = encryptedMsg.slice(0, 64);
                        const ivHex = encryptedMsg.slice(64, 96);
                        const ciphertextHex = encryptedMsg.slice(96);
                        const payloadToVerify = encryptedMsg.slice(64);

                        const keyBytes = hexToBytes(hashedPasswordHex);
                        const ivBytes = hexToBytes(ivHex);
                        const ciphertextBytes = hexToBytes(ciphertextHex);

                        const hmacKey = await window.crypto.subtle.importKey(
                            "raw",
                            keyBytes,
                            { name: "HMAC", hash: "SHA-256" },
                            false,
                            ["verify"]
                        );
                        const payloadBytes = new TextEncoder().encode(payloadToVerify);
                        const expectedHmacBytes = hexToBytes(hmacHex);
                        const isHmacValid = await window.crypto.subtle.verify(
                            "HMAC",
                            hmacKey,
                            expectedHmacBytes,
                            payloadBytes
                        );

                        if (!isHmacValid) {
                            return { success: false };
                        }

                        const aesKey = await window.crypto.subtle.importKey(
                            "raw",
                            keyBytes,
                            { name: "AES-CBC" },
                            false,

                        );

                        );

                        const plainHTML = new TextDecoder().decode(decryptedBuffer);

    const decode = codec.init(cryptoEngine).decode;

    function init(staticryptConfig, templateConfig) {
        const exports = {};

        async function decryptAndReplaceHtml(hashedPassword) {
            const { staticryptEncryptedMsgUniqueVariableName, staticryptSaltUniqueVariableName } = staticryptConfig;
            const { replaceHtmlCallback } = templateConfig;

            const result = await decode(

            );
            if (!result.success) {

            if (typeof replaceHtmlCallback === "function") {

            } else {

            return true;

            const { rememberExpirationKey, rememberPassphraseKey } = templateConfig;

            const isDecryptionSuccessful = await decryptAndReplaceHtml(hashedPassword);

            return {

                hashedPassword,

        function logoutIfNeeded() {
            const logoutKey = "staticrypt_logout";
            const queryParams = new URLSearchParams(window.location.search);
            if (queryParams.has(logoutKey)) {
                clearLocalStorage();
                return true;
            }
            const hash = window.location.hash.substring(1);
            if (hash.includes(logoutKey)) {
                clearLocalStorage();
                return true;
            }
            return false;

            const { rememberDurationInDays } = staticryptConfig;
            const { rememberExpirationKey, rememberPassphraseKey } = templateConfig;

            if (logoutIfNeeded()) {

            const passwordKey = "staticrypt_pwd";
            const rememberMeKey = "remember_me";

            const queryParams = new URLSearchParams(window.location.search);
            const hashedPasswordQuery = queryParams.get(passwordKey);

            const urlFragment = window.location.hash.substring(1);

            const hashedPasswordFragment = hashedPasswordRegexMatch ? hashedPasswordRegexMatch[1] : null;

            if (hashedPassword) {

            }

            return false;
        }

        return exports;
